<html>
    <head>
        <title>Hall 3 Canteen</title>
        <meta name = "viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="utf-8">
        <link rel="stylesheet" href="css/style.css">
        <script type="module" src = "./js/main.js"></script>
        <link rel="icon" type="image/x-icon" href="./public/images/logo.png">
    </head>
    <body>
        <div class="sticky-container">
            <header class = "header">
                <div class = "header__head">
                    <div class="header__logo">
                        <img src = "./public/images/logo.png" alt="Hall 3 Logo">
                    </div>
                    <div class = "header__brand">
                    <h1 class = "header__title">Hall 3 Canteen</h1>
                    <span class = "header__subtitle">By Govind Caterers</span>
                    </div>
                </div>
            
            <button class = "header__status" id = "shop-status-btn" data-open="true" aria-label="Toggle shop status">
                <span class = "header__status__dot" aria-hidden="true"></span>
                <span class = "header__status_label" id = "shop-status-label">Open</span>
            </button>
            </header>
            <div class = "search-wrapper">
                <div class = "search-bar">
                    <svg class="search-bar__icon" viewBox="0 0 24 24" fill = "none"
                        stroke = "currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    <input type="search" placeholder="What's Your Mood..." class = "search-bar__text" id = "search">
                </div>
            </div>
        </div>
        
        <div class = "content">
           
            <div class = "item">
                <!-- <div class = "item__type">
                    <h1 class = "item__type__title">Snacks</h1>
                </div>
                <div id = "snacks" class = "item__wrapper">
                    <div class = "item__dish">
                        <img src="./public/images/burger.png" class = "item__dish__image">
                        <h1 class = "item__dish__name">Burger <img src="./public/images/vegLabel.png" class = "item__dish__label"></h1>
                        <div class = "item__dish__footer">
                            <h1 class = "item__dish__rate">₹ 40</h1>
                            <div class = "add-to-cart__items">
                                <button>+</button> <h1 class = "add-to-cart__items__quantity"> 0 </h1><button>-</button>
                            </div>
                        </div>
                    </div>
                </div> -->

                
                
            </div>


            <div class = "add-to-cart">
                <button class = "order_btn" aria-label="View cart">
                    <img src = "./public/images/cart.png" alt="Cart">
                    <span class="order_btn_badge" id="cart-badge" aria-live="polite"></span>
                </button>
            </div>
        </div>


        <div class = "checkout-overlay" id = "checkout-overlay" role="dialog" aria-modal="true" aria-label="Your order">
            <div class="checkout-container">
                <div class = "checkout-header">
                    <h2>Your Order</h2>
                    <button class="checkout-close" aria-label="Close cart">✕</button>
                </div>

                <div class = "order-now-form"></div>

                <div id = "checkout-items"> </div>

                <div class = "checkout-footer">
                    <div class = "checkout-total-row">
                        <span class = "checkout-total-label">Food Total</span>
                        <span class = "checkout-total" id="food-total">₹0</span>
                    </div>
                    <div class = "checkout-total-row">
                        <span class = "checkout-total-label">Delivery & Packaging</span>
                        <span class = "checkout-total" id="packaging-total">₹0</span>
                    </div>
                    <div class = "checkout-total-row final">
                        <span class = "checkout-total-label">Total</span>
                        <span class="checkout-total" id="checkout-total-amount">₹0</span>
                    </div>
                    <button class="order-now-btn">Order Now</button>
                    <button class="clr-cart-btn">Clear Cart</button>
                </div>
            </div>
        </div>
        
        
        

        <footer class = "footer">
            <span class = "footer__brand">Hall 3 Canteen</span>
            <div class="footer__divider" aria-hidden="true"></div>
            <p class="made_with">By Govind Caterers</p>
            <span class = "contact">Shivansh: <a href="tel:+911234567890" class="phone-link">+91 1234567890</a></span>
        </footer>
        
    </body>
