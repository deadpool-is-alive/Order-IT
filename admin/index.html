<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderIt — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="login-brand">
                <span class="brand-dot"></span>
                <h1>OrderIt</h1>
            </div>
            <p class="login-sub">Admin Portal</p>
            <div id="loginError" class="login-error hidden"></div>
            <div class="field-group">
                <label>Username</label>
                <input type="text" id="loginUsername" placeholder="admin" autocomplete="username" />
            </div>
            <div class="field-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
            </div>
            <button id="loginBtn" class="btn-primary">Sign In</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="dashboard hidden">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="brand-dot"></span>
                <span>OrderIt</span>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="orders">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    Orders
                    <span class="nav-badge" id="newOrdersBadge">0</span>
                </button>
                <button class="nav-item" data-view="products">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 10V7"/></svg>
                    Products
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="shop-toggle-wrap">
                    <div class="shop-status-label">
                        <span id="shopStatusText">Shop Open</span>
                        <span id="shopStatusDot" class="status-dot green"></span>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="shopToggle" checked />
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <button id="logoutBtn" class="btn-logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <!-- SHOP CLOSED BANNER -->
            <div id="shopClosedBanner" class="shop-closed-banner hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                Shop is currently <strong>CLOSED</strong> — customers see a closed message
            </div>

            <!-- ───── ORDERS VIEW ───── -->
            <section id="ordersView" class="view">
                <div class="view-header">
                    <div>
                        <h2>Orders</h2>
                        <p class="view-sub">Live kitchen feed</p>
                    </div>
                    <button class="btn-refresh" id="refreshBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                        Refresh
                    </button>
                </div>

                <!-- STATS ROW -->
                <div class="stats-row" id="statsRow">
                    <div class="stat-card">
                        <span class="stat-num" id="statNew">0</span>
                        <span class="stat-label">New</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num amber" id="statPreparing">0</span>
                        <span class="stat-label">Preparing</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num green" id="statReady">0</span>
                        <span class="stat-label">Ready</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num muted" id="statDelivered">0</span>
                        <span class="stat-label">Delivered</span>
                    </div>
                </div>

                <!-- ORDER TABS -->
                <div class="tab-bar">
                    <button class="tab active" data-tab="new">New</button>
                    <button class="tab" data-tab="ongoing">Ongoing</button>
                    <button class="tab" data-tab="past">Past</button>
                </div>

                <div id="ordersContainer" class="orders-grid">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>Loading orders…</p>
                    </div>
                </div>
            </section>

            <!-- ───── PRODUCTS VIEW ───── -->
            <section id="productsView" class="view hidden">
                <div class="view-header">
                    <div>
                        <h2>Products</h2>
                        <p class="view-sub">Menu management</p>
                    </div>
                    <button class="btn-primary" id="addProductBtn">+ Add Product</button>
                </div>

                <div id="productsContainer" class="products-grid">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>Loading products…</p>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- ───── ORDER DETAIL MODAL ───── -->
    <div id="orderModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalOrderTitle">Order #—</h3>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-footer">
                <label class="field-label">Update Status</label>
                <div class="status-actions" id="statusActions"></div>
            </div>
        </div>
    </div>

    <!-- ───── ADD/EDIT PRODUCT MODAL ───── -->
    <div id="productModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="productModalTitle">Add Product</h3>
                <button class="modal-close" id="productModalClose">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="productId" />
                <div class="field-group">
                    <label>Name</label>
                    <input type="text" id="productName" placeholder="e.g. Paneer Tikka" />
                </div>
                <div class="field-group">
                    <label>Description</label>
                    <textarea id="productDesc" rows="3" placeholder="Short description…"></textarea>
                </div>
                <div class="form-row">
                    <div class="field-group">
                        <label>Price (₹)</label>
                        <input type="number" id="productPrice" placeholder="0.00" min="0" step="0.01" />
                    </div>
                    <div class="field-group">
                        <label>Category</label>
                        <input type="text" id="productCategory" placeholder="e.g. Starters" />
                    </div>
                </div>
                <div id="productFormError" class="login-error hidden"></div>
            </div>
            <div class="modal-footer">
                <button id="saveProductBtn" class="btn-primary">Save Product</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast hidden"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
